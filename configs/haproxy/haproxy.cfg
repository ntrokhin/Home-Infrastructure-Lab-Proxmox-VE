global
    log /dev/log local0
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend multi_443
    bind :443 ssl crt /etc/ssl/private/haproxy-alnmand.ru.pem
    mode tcp
    tcp-request inspect-delay 5s
    tcp-request content accept if { req_ssl_hello_type 1 }

    use_backend zabbix if { ssl_fc_sni -i zabbix.alnmand.ru }
    use_backend rdp_gw if { ssl_fc_sni -i rdp.alnmand.ru }

    default_backend rdp_gw

backend rdp_gw
    mode tcp
    server tsgw 192.168.77.143:443 check ssl verify none

backend zabbix
    mode tcp
    server zabbix 192.168.77.132:443 check ssl verify none sni str(zabbix.alnmand.ru)
