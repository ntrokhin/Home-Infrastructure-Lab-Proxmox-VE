<VirtualHost *:443>
    ServerName zabbix.alnmand.ru
    DocumentRoot /usr/share/zabbix

    SSLEngine on
    SSLCertificateFile      /etc/ssl/alnmand.ru/fullchain.pem
    SSLCertificateKeyFile   /etc/ssl/alnmand.ru/privkey.pem

    <Directory /usr/share/zabbix>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/zabbix_error.log
    CustomLog ${APACHE_LOG_DIR}/zabbix_access.log combined
</VirtualHost>
